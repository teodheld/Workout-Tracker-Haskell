<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
      color: #ffffff;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.3rem;
      display: block;
    }

    textarea {
      width: 100%;
      height: 140px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #555; }

    textarea::placeholder { color: #444; }

    button {
      align-self: flex-start;
      background: #ffffff;
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #ddd; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }

    .result-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      display: none;
    }

    .result-box.visible { display: block; }

    .result-box.error { border-color: #5c2323; }

    .result-box h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 0.75rem;
    }

    .volume {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 1rem;
    }

    .volume span {
      font-size: 1rem;
      font-weight: 400;
      color: #666;
      margin-left: 0.3rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      color: #555;
      font-weight: 500;
      padding: 0.3rem 0.5rem;
      border-bottom: 1px solid #2a2a2a;
    }

    td {
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid #1f1f1f;
      color: #ccc;
    }

    .error-msg {
      font-family: monospace;
      font-size: 0.85rem;
      color: #e07070;
      white-space: pre-wrap;
    }

    .history-section { margin-top: 1rem; }

    .history-section h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .workout-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      color: #aaa;
    }

    .workout-card strong { color: #ddd; }
  </style>
</head>
<body>

<div class="container">
  <div>
    <h1>Workout Tracker</h1>
    <p class="subtitle">Enter your workout using the DSL below</p>
  </div>

  <div>
    <label>Workout input</label>
    <textarea id="input" placeholder="Squat 5x100&#10;Bench 3x80&#10;Deadlift 1x180"></textarea>
  </div>

  <button id="submitBtn" onclick="submitWorkout()">Submit</button>

  <!-- Result / error box -->
  <div class="result-box" id="resultBox">
    <h2>Result</h2>
    <div id="resultContent"></div>
  </div>

  <!-- History -->
  <div class="history-section">
    <h2>Previous workouts</h2>
    <div id="history"></div>
  </div>
</div>

<script>
  // Load existing workouts on page open
  window.onload = loadHistory;

  async function submitWorkout() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Submitting...";

    try {
      const res = await fetch("/workouts", {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: input
      });

      const resultBox = document.getElementById("resultBox");
      const resultContent = document.getElementById("resultContent");
      resultBox.classList.add("visible");

      if (res.ok) {
        const data = await res.json();
        resultBox.classList.remove("error");
        resultContent.innerHTML = renderResult(data);
        loadHistory();
      } else {
        const errText = await res.text();
        resultBox.classList.add("error");
        resultContent.innerHTML = `<div class="error-msg">${escapeHtml(errText)}</div>`;
      }
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit";
    }
  }

  function renderResult(data) {
    const rows = data.workout.map(s =>
      `<tr>
        <td>${s.exercise}</td>
        <td>${s.repetitions}</td>
        <td>${s.weight} kg</td>
        <td>${(s.repetitions * s.weight).toFixed(1)}</td>
      </tr>`
    ).join("");

    return `
      <div class="volume">${data.volume.toFixed(1)}<span>kg total volume</span></div>
      <table>
        <thead>
          <tr><th>Exercise</th><th>Reps</th><th>Weight</th><th>Volume</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function loadHistory() {
    const res = await fetch("/workouts");
    if (!res.ok) return;
    const workouts = await res.json();
    const el = document.getElementById("history");

    if (workouts.length === 0) {
      el.innerHTML = `<p style="color:#555;font-size:0.875rem">No workouts yet.</p>`;
      return;
    }

    el.innerHTML = workouts.map((w, i) => {
      const vol = w.reduce((sum, s) => sum + s.repetitions * s.weight, 0);
      const summary = w.map(s => `${s.exercise} ${s.repetitions}x${s.weight}`).join(", ");
      return `<div class="workout-card">
        <strong>#${workouts.length - i}</strong> — ${summary}
        <span style="float:right;color:#666">${vol.toFixed(1)} kg</span>
      </div>`;
    }).join("");
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
</script>
</body>
</html>
