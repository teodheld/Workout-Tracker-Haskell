<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
  --bg:         #f5f0e8;
  --bg-card:    #ede8df;
  --border:     #d4c9b5;
  --text:       #2c2a26;
  --text-muted: #8a8070;
  --text-dim:   #6b6358;
  --accent:     #2c2a26;
  --accent-fg:  #f5f0e8;
  --error:      #a0523a;
  --error-bg:   #f5ede8;
  --error-border: #c4856a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem;
}
h1 { font-size: 1.8rem; margin-bottom: 0.25rem; color: var(--text); }
p.subtitle { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem; }
.container { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 1rem; }

.tabs { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
.tab {
  padding: 0.45rem 1.1rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.15s;
  align-self: auto;
}
.tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 600; }

.panel { display: none; flex-direction: column; gap: 1rem; }
.panel.active { display: flex; }

label { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.3rem; display: block; }
textarea {
  width: 100%; height: 140px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: monospace; font-size: 0.95rem;
  padding: 0.75rem 1rem; resize: vertical; outline: none;
}
textarea:focus { border-color: var(--text-muted); }
textarea::placeholder { color: var(--border); }

button {
  align-self: flex-start;
  background: var(--accent); color: var(--accent-fg);
  border: none; border-radius: 6px;
  padding: 0.6rem 1.4rem; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
button:hover { background: var(--text-dim); }
button:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

.result-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem; display: none;
}
.result-box.visible { display: block; }
.result-box.error { border-color: var(--error-border); background: var(--error-bg); }
.result-box h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.75rem; }
.volume { font-size: 2rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; }
.volume span { font-size: 1rem; font-weight: 400; color: var(--text-muted); margin-left: 0.3rem; }
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th { text-align: left; color: var(--text-muted); font-weight: 500; padding: 0.3rem 0.5rem; border-bottom: 1px solid var(--border); }
td { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); color: var(--text); }
.error-msg { font-family: monospace; font-size: 0.85rem; color: var(--error); white-space: pre-wrap; }

.workout-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.75rem 1rem;
  margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-dim);
  display: flex; align-items: center; justify-content: space-between;
  gap: 0.5rem;
}
.workout-card strong { color: var(--text); }
.workout-card .summary { flex: 1; }
.workout-card .vol-label { color: var(--text-muted); white-space: nowrap; }

.delete-btn {
  background: transparent;
  color: var(--border);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.8rem;
  padding: 0.2rem 0.5rem;
  transition: all 0.15s;
  align-self: auto;
  flex-shrink: 0;
}
.delete-btn:hover { color: var(--error); border-color: var(--error-border); background: transparent; }

.exercise-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.ex-btn {
  padding: 0.35rem 0.9rem; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); cursor: pointer; font-size: 0.85rem;
  transition: all 0.15s;
}
.ex-btn.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 600; }
.chart-container {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem;
  position: relative; height: 280px;
}
.no-data { color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 2rem 0; }
  </style>
</head>
<body>
<div class="container">
  <div>
    <h1>Workout Tracker</h1>
    <p class="subtitle">Track your lifts and view progress over time</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')">Log Workout</button>
    <button class="tab"        onclick="switchTab('progress')">Progress</button>
  </div>

  <!-- Log tab -->
  <div class="panel active" id="panel-log">
    <div>
      <label>Workout input</label>
      <textarea id="input" placeholder="Squat 8x100.0, 5x110.0 &#10;Bench 3x80.0&#10;Deadlift 1x180.0"></textarea>
    </div>
    <button id="submitBtn" onclick="submitWorkout()">Submit</button>

    <div class="result-box" id="resultBox">
      <h2>Result</h2>
      <div id="resultContent"></div>
    </div>

    <div>
      <h2 style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em;color:#8a8070;margin-bottom:0.75rem">
        Previous workouts
      </h2>
      <div id="history"></div>
    </div>
  </div>

  <!-- Progress tab -->
  <div class="panel" id="panel-progress">
    <div>
      <label>Select exercise</label>
      <div class="exercise-selector" id="exerciseSelector"></div>
    </div>
    <div class="chart-container">
      <canvas id="progressChart"></canvas>
      <div class="no-data" id="noData" style="display:none">No data yet for this exercise.</div>
    </div>
  </div>
</div>

<script>
  let progressChart = null;
  let progressData  = [];

  window.onload = () => { loadHistory(); loadProgress(); };

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['log','progress'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'progress') loadProgress();
  }

  async function submitWorkout() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    const btn = document.getElementById("submitBtn");
    btn.disabled = true; btn.textContent = "Submitting...";

    try {
      const res = await fetch("/workouts", {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: input
      });

      const resultBox     = document.getElementById("resultBox");
      const resultContent = document.getElementById("resultContent");
      resultBox.classList.add("visible");

      if (res.ok) {
        const data = await res.json();
        resultBox.classList.remove("error");
        resultContent.innerHTML = renderResult(data);
        loadHistory();
        loadProgress();
      } else {
        const errText = await res.text();
        resultBox.classList.add("error");
        resultContent.innerHTML = `<div class="error-msg">${escapeHtml(errText)}</div>`;
      }
    } finally {
      btn.disabled = false; btn.textContent = "Submit";
    }
  }

  function renderResult(data) {
    const sets = data.workout;
    const rows = sets.map(s =>
      `<tr>
        <td>${s.exercise}</td>
        <td>${s.repetitions}</td>
        <td>${s.weight} kg</td>
        <td>${(s.repetitions * s.weight).toFixed(1)}</td>
      </tr>`
    ).join("");
    return `
      <div class="volume">${data.volume.toFixed(1)}<span>kg total volume</span></div>
      <table>
        <thead><tr><th>Exercise</th><th>Reps</th><th>Weight</th><th>Volume</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function loadHistory() {
    const res = await fetch("/workouts");
    if (!res.ok) return;
    const workouts = await res.json();
    const el = document.getElementById("history");

    if (workouts.length === 0) {
      el.innerHTML = `<p style="color:#8a8070;font-size:0.875rem">No workouts yet.</p>`;
      return;
    }

    el.innerHTML = workouts.map((w, i) => {
      const vol     = w.reduce((sum, s) => sum + s.repetitions * s.weight, 0);
      const summary = w.map(s => `${s.exercise} ${s.repetitions}x${s.weight}`).join(", ");
      return `<div class="workout-card">
        <span class="summary"><strong>#${workouts.length - i}</strong> — ${summary}</span>
        <span class="vol-label">${vol.toFixed(1)} kg</span>
        <button class="delete-btn" onclick="deleteWorkout(${i})">✕</button>
      </div>`;
    }).join("");
  }

  async function deleteWorkout(index) {
    const res = await fetch(`/workouts/${index}`, { method: "DELETE" });
    if (res.ok) {
      loadHistory();
      loadProgress();
    }
  }

  async function loadProgress() {
    const res = await fetch("/progress");
    if (!res.ok) return;
    progressData = await res.json();
    renderExerciseButtons();
  }

  function renderExerciseButtons() {
    const sel = document.getElementById("exerciseSelector");
    if (progressData.length === 0) {
      sel.innerHTML = `<span style="color:#8a8070;font-size:0.875rem">No exercises logged yet.</span>`;
      if (progressChart) { progressChart.destroy(); progressChart = null; }
      return;
    }
    const current = sel.querySelector('.ex-btn.active')?.textContent;
    sel.innerHTML = progressData.map(d =>
      `<button class="ex-btn ${d.exerciseName === current ? 'active' : ''}"
               onclick="selectExercise('${d.exerciseName}')">${d.exerciseName}</button>`
    ).join("");

    const toSelect = current && progressData.find(d => d.exerciseName === current)
      ? current
      : progressData[0].exerciseName;
    selectExercise(toSelect);
  }

  function selectExercise(name) {
    document.querySelectorAll('.ex-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === name);
    });

    const data   = progressData.find(d => d.exerciseName === name);
    const noData = document.getElementById("noData");
    const canvas = document.getElementById("progressChart");

    if (!data || data.progressPoint.length === 0) {
      noData.style.display = "block";
      canvas.style.display = "none";
      return;
    }

    noData.style.display = "none";
    canvas.style.display = "block";

    const labels = data.progressPoint.map(p => `Session ${p.sessionIndex}`);
    const values = data.progressPoint.map(p => p.vol);

    // Read colors from CSS variables so chart always matches the theme
    const style      = getComputedStyle(document.documentElement);
    const text       = style.getPropertyValue('--text').trim();
    const textMuted  = style.getPropertyValue('--text-muted').trim();
    const textDim    = style.getPropertyValue('--text-dim').trim();
    const border     = style.getPropertyValue('--border').trim();

    if (progressChart) progressChart.destroy();

    progressChart = new Chart(canvas, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: `${name} — volume (kg)`,
          data: values,
          borderColor: text,
          backgroundColor: "rgba(44,42,38,0.08)",
          pointBackgroundColor: text,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: textDim } } },
        scales: {
          x: { ticks: { color: textMuted }, grid: { color: border } },
          y: { ticks: { color: textMuted }, grid: { color: border },
               title: { display: true, text: "Volume (kg)", color: textMuted } }
        }
      }
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
</script>
</body>
</html>
